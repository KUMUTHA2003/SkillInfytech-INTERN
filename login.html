<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet" href="loginstyle1.css">
</head>
<body>
    
    <h2>Login </h2>
    <form method="post" action="login">
        <label for="username">Username:</label>
        <input type="text" id="loginUser" name="username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="loginPass" name="password" required>
        <br>
        <button type="button" onclick="login()">Login</button>
    </form>

    <p> Don't have account? <a href="register.html">Register</a></p>

    <br>

    <script src="script.js"></script>
</body>
</html>
