<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="registerstyle2.css">
</head>
<body>
    <h1>Simple Login Authentication</h1>
    <h2>Register</h2>
    <form method="post" action="register">
        <label for="username">Username:</label>
        <input type="text" id="regUser" name="username" required>
        <br>
        <label for="password">Password:</label>
        <input type="password" id="regPass" name="password" required>
        <br>
        <button type="button" onclick="register()">Register</button>
    </form>
    <p> Already have account? <a href="login.html">Login</a></p>

    <script src="script.js"></script>
</body>
</html>
